name: insuramind

services:
  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: insuramind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: insuramind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-insuramind}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-insuramind-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    container_name: insuramind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    container_name: insuramind-backend
    profiles: ["app"]
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-to-a-long-random-secret-change-this-to-a-long-random-secret}
      APP_INTERNAL_TOKEN: ${APP_INTERNAL_TOKEN:-dev-internal-token-change-me}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000}
      APP_AI_BASE_URL: http://ai-service:8001
      APP_MINIO_ENDPOINT: http://minio:9000
      APP_MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      APP_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-insuramind}
      APP_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-insuramind-secret}
      APP_MINIO_BUCKET: ${MINIO_BUCKET:-insuramind-documents}
    depends_on:
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "8080:8080"

  ai-service:
    build:
      context: ./ai-services
    container_name: insuramind-ai
    profiles: ["app"]
    environment:
      BACKEND_BASE_URL: http://backend:8080/api
      INTERNAL_TOKEN: ${APP_INTERNAL_TOKEN:-dev-internal-token-change-me}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-insuramind}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-insuramind-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-insuramind-documents}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-insuramind_chunks}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_FAST_MODEL: ${GEMINI_FAST_MODEL:-gemini-1.5-flash}
      GEMINI_REASONING_MODEL: ${GEMINI_REASONING_MODEL:-gemini-1.5-pro}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-large-en-v1.5}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
    depends_on:
      backend:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
    container_name: insuramind-frontend
    profiles: ["app"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  qdrant-data:
  minio-data:
  redis-data:
